<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Digitaldaari — Digital Marketing & Creative Agency</title>
    <meta name="description" content="Digitaldaari is a premium digital marketing and creative agency offering SEO, Local SEO, Website Design, Social Media Marketing, PPC, Graphic Design, Video Editing, Photoshoots and Videoshoots." />
    <meta name="keywords" content="digital marketing agency, SEO, local SEO, website design, social media marketing, PPC, graphic design, video editing, photoshoots" />
    <meta property="og:title" content="Digitaldaari — Digital Marketing & Creative Agency" />
    <meta property="og:description" content="We help local businesses, startups and personal brands grow online with data-driven digital marketing strategies." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/favicon.png.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT;
      const websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;

      if (endpoint && websiteId) {
        const analyticsScript = document.createElement("script");
        analyticsScript.defer = true;
        analyticsScript.src = `${String(endpoint).replace(/\/$/, "")}/umami`;
        analyticsScript.setAttribute("data-website-id", websiteId);
        document.body.appendChild(analyticsScript);
      }
    </script>
  </body>
</html>
